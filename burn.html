<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>AETHER · burn</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0f12" media="(prefers-color-scheme: dark)">
<meta property="og:type" content="website">
<meta property="og:title" content="AETHER">
<meta property="og:description" content="reserve · read-only node">
<meta property="og:url" content="https://theanhgen.github.io/aether/">
<meta property="og:image" content="https://theanhgen.github.io/aether/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AETHER">
<meta name="twitter:description" content="reserve · read-only node">
<meta name="twitter:image" content="https://theanhgen.github.io/aether/og.png">
<link rel="stylesheet" href="aether.css">
</head>
<body>
<div class="wrap">
  <header>
    <a class="brand" href="manifest.html">
      <div>
        <h1><span class="dot"></span>AETHER</h1>
        <div class="sub" id="sub">burn</div>
      </div>
    </a>
    <div class="updated" id="updated"></div>
  </header>

  <div class="chart-head" style="padding:0 2px 8px">
    <div>
      <div class="chart-title" id="tname">—</div>
      <div class="chart-desc" id="tdates"></div>
    </div>
  </div>

  <div id="cats"></div>
  <div class="card triptotal" id="ttotal"></div>

  <a class="navlink" href="manifest.html" style="margin-top:20px">⟢ manifest</a>
  <footer>AETHER · read-only node · resync ⟢ each cycle</footer>
</div>

<script src="data.js"></script>
<script>
document.getElementById("updated").textContent = "sync ⟢ " + shortDate;

const id = decodeURIComponent(location.hash.slice(1)).toLowerCase();
const trip = (typeof LOG !== "undefined" ? LOG : [])
  .find(t => t.name.toLowerCase() === id && Array.isArray(t.items) && t.items.length);

if (!trip) {
  document.getElementById("tname").textContent = "not found";
  document.getElementById("tdates").textContent = "no detail for this entry — use the link below";
} else {
  document.getElementById("sub").textContent = trip.name.toLowerCase();
  document.getElementById("tname").textContent = trip.name;
  document.getElementById("tdates").textContent = trip.dates;

  const CATS = ["thrust", "berth", "galley", "survey", "aux"];   // coded spend buckets
  const by = {};
  trip.items.forEach(it => (by[it.category || "aux"] ??= []).push(it));
  // known categories in order, then any unknown ones (never silently drop an item)
  const order = [...CATS.filter(c => by[c]), ...Object.keys(by).filter(c => !CATS.includes(c))];

  document.getElementById("cats").innerHTML = order.map(c => {
    const sub = by[c].reduce((s, it) => s + it.amount, 0);
    const rows = by[c].map(it => `
      <div class="row">
        <div><div class="name">${it.date}</div></div>
        <div class="amt tnum out">−${czMoney(it.amount)} AU</div>
      </div>`).join("");
    return `<h2 style="margin-top:22px">${c}</h2>
      <div class="card log">${rows}
        <div class="row catsub"><div class="name">subtotal</div><div class="amt tnum">−${czMoney(sub)} AU</div></div>
      </div>`;
  }).join("");

  document.getElementById("ttotal").innerHTML = `
    <div class="row" style="border:0; padding:0">
      <div class="name">total discharged</div>
      <div>
        <div class="amt tnum">−${czMoney(trip.total ?? 0)} AU</div>
        <div class="per tnum">${czMoney(trip.per ?? 0)} / unit</div>
      </div>
    </div>`;
}
</script>
</body>
</html>
